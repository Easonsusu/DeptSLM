name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository-policy:
    name: Repository artifact policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject forbidden tracked artifacts
        shell: bash
        run: |
          set -euo pipefail
          violations=0

          while IFS= read -r -d '' path; do
            normalized_path="/${path}"

            case "${normalized_path}" in
              */runtime/*|*/.runtime/*|*/uploads/*|*/extracted_text/*|*/vector_snapshots/*|*/training_datasets/*|*/adapters/*|*/model_cache/*|*/eval_results/*|*/logs/*|*/exports/*|*/service_state/*|*/postgres-data/*|*/qdrant_storage/*|*/.docker-data/*|*/.huggingface/*|*/.ollama/*|*/model_weights/*|*/models-cache/*|*/node_modules/*|*/.next/*|*/__pycache__/*|*/.pytest_cache/*|*/.ruff_cache/*|*/.pnpm-store/*|*/.venv/*)
                printf 'Forbidden tracked artifact path: %s\n' "${path}" >&2
                violations=1
                ;;
            esac

            case "${path}" in
              *.safetensors|*.bin|*.gguf|*.ggml|*.pt|*.pth|*.ckpt|*.onnx|*.h5|*.tflite|*.db|*.db-shm|*.db-wal|*.sqlite|*.sqlite3|*.log)
                printf 'Forbidden tracked artifact file: %s\n' "${path}" >&2
                violations=1
                ;;
            esac

            case "${path}" in
              .env|.env.*|*/.env|*/.env.*)
                case "${path}" in
                  .env.example|*/.env.example) ;;
                  *)
                    printf 'Forbidden tracked environment file: %s\n' "${path}" >&2
                    violations=1
                    ;;
                esac
                ;;
            esac
          done < <(git ls-files -z)

          exit "${violations}"
      - name: Verify policy check leaves the checkout clean
        shell: bash
        run: |
          status_file="${RUNNER_TEMP}/git-status"
          git status --porcelain --untracked-files=all > "${status_file}"
          if [[ -s "${status_file}" ]]; then
            cat "${status_file}" >&2
            exit 1
          fi

  web:
    name: Web type-check and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @deptslm/web typecheck
      - run: pnpm --filter @deptslm/web test
      - run: pnpm --filter @deptslm/web build
      - name: Verify web checks leave the checkout clean
        shell: bash
        run: |
          status_file="${RUNNER_TEMP}/git-status"
          git status --porcelain --untracked-files=all > "${status_file}"
          if [[ -s "${status_file}" ]]; then
            cat "${status_file}" >&2
            exit 1
          fi

  api:
    name: API, worker, and storage checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: deptslm_test
          POSTGRES_PASSWORD: deptslm
          POSTGRES_USER: deptslm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deptslm -d deptslm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.13.4
        env:
          QDRANT__SERVICE__API_KEY: phase6-ci-qdrant-key-0123456789
        ports:
          - 6333:6333
    env:
      DATABASE_URL: postgresql+psycopg://deptslm:deptslm@localhost:5432/deptslm_test
      DATABASE_TEST_URL: postgresql+psycopg://deptslm:deptslm@localhost:5432/deptslm_test
      DEPTSLM_REQUIRE_POSTGRES_TESTS: "1"
      DEPTSLM_REQUIRE_QDRANT_TESTS: "1"
      DEPTSLM_TEST_QDRANT_URL: http://localhost:6333
      DEPTSLM_TEST_QDRANT_API_KEY: phase6-ci-qdrant-key-0123456789
      DEPTSLM_TEST_QDRANT_ISOLATED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt
            services/rag-worker/pyproject.toml
            services/rag-runtime/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
        working-directory: apps/api
      - name: Check Python dependency consistency
        working-directory: apps/api
        run: python -m pip check
      - name: Lint API
        working-directory: apps/api
        run: |
          python -m ruff check app tests ../../services/rag-worker/deptslm_worker ../../services/rag-runtime/deptslm_runtime
          python -m ruff format --check app tests ../../services/rag-worker/deptslm_worker ../../services/rag-runtime/deptslm_runtime
      - name: Run API tests with temporary storage
        working-directory: apps/api
        run: |
          export DEPTSLM_DATA_DIR="$RUNNER_TEMP/deptslm-data"
          mkdir -p "$DEPTSLM_DATA_DIR/uploads" "$DEPTSLM_DATA_DIR/extracted_text" "$DEPTSLM_DATA_DIR/model_cache"
          for attempt in {1..30}; do
            if curl --fail --silent --header "api-key: $DEPTSLM_TEST_QDRANT_API_KEY" "$DEPTSLM_TEST_QDRANT_URL/healthz" >/dev/null; then
              break
            fi
            if [[ "$attempt" -eq 30 ]]; then
              echo "Qdrant did not become healthy." >&2
              exit 1
            fi
            sleep 1
          done
          python -m alembic upgrade head
          test "$(python -m alembic current | awk '{print $1}')" = "0006_phase8_rag_feedback"
          python -m pytest
      - name: Run one-shot worker smoke test
        working-directory: apps/api
        run: |
          export DEPTSLM_DATA_DIR="$RUNNER_TEMP/deptslm-worker-smoke"
          mkdir -p "$DEPTSLM_DATA_DIR/uploads" "$DEPTSLM_DATA_DIR/extracted_text"
          python -m deptslm_worker --once
      - name: Run one-shot indexing worker smoke test with fake embeddings
        working-directory: apps/api
        env:
          ENVIRONMENT: test
          DEPTSLM_QDRANT_URL: http://localhost:6333
          DEPTSLM_QDRANT_API_KEY: phase6-ci-qdrant-key-0123456789
          DEPTSLM_QDRANT_COLLECTION: deptslm_chunks_qwen3_0_6b_1024_v1
          DEPTSLM_EMBEDDING_MODEL_REVISION: d23109d65ca9fdf61eef614209744716f337f50f
          DEPTSLM_EMBEDDING_PROVIDER: fake
        run: |
          export DEPTSLM_DATA_DIR="$RUNNER_TEMP/deptslm-indexer-smoke"
          mkdir -p "$DEPTSLM_DATA_DIR/extracted_text" "$DEPTSLM_DATA_DIR/model_cache"
          python -m deptslm_worker.vector_admin bootstrap
          python -m deptslm_worker.indexer --once
      - name: Verify API checks leave the checkout clean
        shell: bash
        run: |
          status_file="${RUNNER_TEMP}/git-status"
          git status --porcelain --untracked-files=all > "${status_file}"
          if [[ -s "${status_file}" ]]; then
            cat "${status_file}" >&2
            exit 1
          fi

  infrastructure:
    name: Infrastructure static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n scripts/setup_google_drive_storage.sh
          bash -n scripts/validate_data_dir.sh
          bash -n scripts/compose.sh
          sh -n services/rag-worker/entrypoint.sh
          sh -n services/training-worker/entrypoint.sh
      - name: Check required infrastructure files and permissions
        run: |
          test -s docker-compose.yml
          test -x scripts/setup_google_drive_storage.sh
          test -x scripts/validate_data_dir.sh
          test -x scripts/compose.sh
          test -x services/rag-worker/entrypoint.sh
          test -x services/training-worker/entrypoint.sh
      - name: Build and inspect API migration image
        run: |
          docker build --tag deptslm-api-ci --file apps/api/Dockerfile .
          docker run --rm --entrypoint python deptslm-api-ci -c '
          import pathlib
          import app.admin
          import app.document_storage
          import app.document_upload
          import app.main
          assert pathlib.Path("/app/alembic.ini").is_file()
          assert pathlib.Path("/app/alembic/versions/0001_phase3_schema.py").is_file()
          assert pathlib.Path("/app/alembic/versions/0002_phase4_documents.py").is_file()
          assert pathlib.Path("/app/alembic/versions/0003_phase5_extraction.py").is_file()
          assert pathlib.Path("/app/alembic/versions/0004_phase6_vector_indexing.py").is_file()
          assert pathlib.Path("/app/alembic/versions/0005_phase7_rag_answers.py").is_file()
          assert pathlib.Path("/app/alembic/versions/0006_phase8_rag_feedback.py").is_file()
          import importlib.util
          assert importlib.util.find_spec("pypdf") is None
          assert importlib.util.find_spec("qdrant_client") is not None
          assert importlib.util.find_spec("sentence_transformers") is None
          assert importlib.util.find_spec("transformers") is None
          '
      - name: Build and inspect extraction worker image
        run: |
          docker build --target extraction --tag deptslm-rag-worker-ci --file services/rag-worker/Dockerfile .
          docker run --rm --entrypoint python deptslm-rag-worker-ci -I -c '
          import importlib.util
          import pypdf
          import deptslm_worker
          import deptslm_worker.extraction_runner
          import deptslm_worker.queue
          assert tuple(int(part) for part in pypdf.__version__.split(".")[:2]) >= (6, 14)
          assert importlib.util.find_spec("qdrant_client") is None
          assert importlib.util.find_spec("sentence_transformers") is None
          '
      - name: Build and inspect indexing worker image
        run: |
          docker build --target indexing --tag deptslm-indexing-worker-ci --file services/rag-worker/Dockerfile .
          docker run --rm --entrypoint python deptslm-indexing-worker-ci -I -c '
          import importlib.util
          import deptslm_worker.indexer
          import deptslm_worker.qdrant_adapter
          import qdrant_client
          import sentence_transformers
          assert importlib.util.find_spec("llama_index") is None
          '
          # setuptools installs this Python import-path configuration file; it is not a model artifact.
          weight_matches="$(docker run --rm --entrypoint sh deptslm-indexing-worker-ci -c 'find / -type f \( -name "*.safetensors" -o -name "*.bin" -o -name "*.gguf" -o -name "*.pt" -o -name "*.pth" \) ! -path "/usr/local/lib/python3.12/site-packages/distutils-precedence.pth" -print 2>/dev/null || true')"
          if [[ -n "$weight_matches" ]]; then
            printf 'Forbidden model-weight-like files in indexing image:\n%s\n' "$weight_matches" >&2
            exit 1
          fi
      - name: Build and inspect internal RAG runtime image
        run: |
          docker build --tag deptslm-rag-runtime-ci --file services/rag-runtime/Dockerfile .
          docker run --rm --entrypoint python deptslm-rag-runtime-ci -I -c '
          import importlib.util
          import deptslm_runtime.model_child
          import deptslm_runtime.main
          import deptslm_runtime.supervisor
          import sentence_transformers
          import transformers
          assert importlib.util.find_spec("qdrant_client") is None
          assert importlib.util.find_spec("psycopg") is None
          '
          weight_matches="$(docker run --rm --entrypoint sh deptslm-rag-runtime-ci -c 'find / -type f \( -name "*.safetensors" -o -name "*.bin" -o -name "*.gguf" -o -name "*.pt" -o -name "*.pth" \) ! -path "/usr/local/lib/python3.12/site-packages/distutils-precedence.pth" -print 2>/dev/null || true')"
          if [[ -n "$weight_matches" ]]; then
            printf 'Forbidden model-weight-like files in RAG runtime image:\n%s\n' "$weight_matches" >&2
            exit 1
          fi
          runtime_data="$RUNNER_TEMP/deptslm-rag-runtime"
          mkdir -p "$runtime_data/model_cache"
          container_id="$(docker run --detach --read-only --cap-drop ALL --security-opt no-new-privileges:true \
            --publish 127.0.0.1:18010:8010 \
            --volume "$runtime_data/model_cache:/runtime/deptslm/model_cache:ro" \
            --env DEPTSLM_DATA_DIR=/runtime/deptslm \
            --env DEPTSLM_RAG_RUNTIME_TOKEN=phase7-ci-runtime-token-0123456789-abcdef \
            --env DEPTSLM_RAG_RUNTIME_PROVIDER=fake \
            --env DEPTSLM_RAG_RUNTIME_MAX_CONCURRENCY=1 \
            --env DEPTSLM_EMBEDDING_MODEL_REVISION=d23109d65ca9fdf61eef614209744716f337f50f \
            --env DEPTSLM_GENERATION_MODEL_REVISION=c1899de289a04d12100db370d81485cdf75e47ca \
            --env ENVIRONMENT=test \
            deptslm-rag-runtime-ci)"
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18010/healthz >/dev/null; then
              break
            fi
            if [[ "$attempt" == "30" ]]; then
              echo "RAG runtime fake smoke test did not become ready." >&2
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent \
            --header 'Authorization: Bearer phase7-ci-runtime-token-0123456789-abcdef' \
            --header 'Content-Type: application/json' \
            --data '{"question":"Synthetic runtime smoke?"}' \
            http://127.0.0.1:18010/internal/v1/query-embedding \
            | python -c 'import json,sys; value=json.load(sys.stdin); assert len(value["vector"]) == 1024'
          docker rm --force "$container_id" >/dev/null
          trap - EXIT
      - name: Check raw streaming upload boundary
        run: |
          ! grep -R -E 'UploadFile|python-multipart|request\.body\(' apps/api/app apps/api/requirements*.txt
      - name: Check Phase 5 extraction isolation
        run: |
          ! grep -E -i 'qdrant|transformers|sentence_transformers|huggingface_hub' services/rag-worker/deptslm_worker/{__main__,pipeline,queue,extractor,extraction_runner}.py
          ! grep -R -E -i 'llamaindex|llama_index|pytesseract|easyocr' services/rag-worker/deptslm_worker services/rag-worker/pyproject.toml
          ! git ls-files | grep -E '(^|/)(normalized\.txt|chunks\.jsonl|manifest\.json)$'
      - name: Check Phase 6 architecture boundaries
        run: |
          ! grep -E 'QdrantClient|qdrant_client' apps/api/app/routes.py
          test "$(grep -R -l 'QdrantClient' services/rag-worker/deptslm_worker --include='*.py' | sort)" = "services/rag-worker/deptslm_worker/qdrant_adapter.py"
          ! grep -E '@router\.(get|post).*search|/search|query_vector' apps/api/app/routes.py
          ! grep -E 'qdrant/qdrant:(latest|main)' docker-compose.yml .github/workflows/ci.yml
          grep -R -F 'd23109d65ca9fdf61eef614209744716f337f50f' apps/api/app services/rag-worker/deptslm_worker >/dev/null
      - name: Check Phase 7 architecture boundaries
        run: |
          ! grep -E '@router\.(get|post).*search|/search|query_vector' apps/api/app/routes.py apps/api/app/schemas.py
          ! sed -n '/^  rag-runtime:/,/^  training-worker:/p' docker-compose.yml | grep -E 'DATABASE(_TEST)?_URL|DEPTSLM_QDRANT_(URL|API_KEY)|DEPTSLM_AUTH_|HF_TOKEN|HUGGING_FACE_HUB_TOKEN|HTTP_PROXY|HTTPS_PROXY|ALL_PROXY|NO_PROXY'
          ! grep -R -E 'dangerouslySetInnerHTML|localStorage|sessionStorage' apps/web/app
          test "$(grep -R -l 'QdrantClient' services/rag-worker/deptslm_worker apps/api/app --include='*.py' | sort)" = "services/rag-worker/deptslm_worker/qdrant_adapter.py"
          grep -R -F 'c1899de289a04d12100db370d81485cdf75e47ca' apps/api/app services/rag-runtime services/rag-worker/deptslm_worker >/dev/null
          grep -R -F 'DEPTSLM_RAG_RUNTIME_TOKEN' services/rag-runtime/deptslm_runtime/settings.py >/dev/null
          grep -R -F 'GENERATION_MODEL_CONTEXT_TOKENS = 40960' apps/api/app/rag_domain.py >/dev/null
          grep -R -F 'MAX_GENERATION_INPUT_TOKENS = 8192' apps/api/app/rag_domain.py >/dev/null
      - name: Check Phase 8 feedback isolation
        run: |
          ! grep -E -i 'qdrant|RagRuntimeClient|Phase5ArtifactReader|selected_chunk_reader|torch|transformers|sentence_transformers|model_store' apps/api/app/rag_feedback_*.py
          ! grep -R -E 'dangerouslySetInnerHTML|localStorage|sessionStorage|indexedDB' apps/web/app
          ! grep -R -E '<textarea|type="text"' apps/web/app/components/RagFeedbackPanel.tsx apps/web/app/components/FeedbackReviewQueue.tsx
          ! grep -E '@router\.(get|post).*search|/search|query_vector' apps/api/app/routes.py apps/api/app/schemas.py
      - name: Validate Compose configuration when available
        run: |
          if docker compose version >/dev/null 2>&1; then
            export DEPTSLM_DATA_DIR="$RUNNER_TEMP/deptslm-data"
            export DEPTSLM_QDRANT_API_KEY="phase6-ci-compose-key-0123456789"
            export DEPTSLM_RAG_RUNTIME_TOKEN="phase7-ci-runtime-token-0123456789-abcdef"
            mkdir -p "$DEPTSLM_DATA_DIR"/{uploads,extracted_text,vector_snapshots,training_datasets,adapters,model_cache,eval_results,logs,exports}
            mkdir -p "$DEPTSLM_DATA_DIR/service_state/postgres"
            mkdir -p "$DEPTSLM_DATA_DIR/service_state/qdrant"
            ./scripts/compose.sh config --quiet
          else
            echo "Docker Compose unavailable; skipping Compose configuration validation."
          fi
      - name: Verify infrastructure checks leave the checkout clean
        shell: bash
        run: |
          status_file="${RUNNER_TEMP}/git-status"
          git status --porcelain --untracked-files=all > "${status_file}"
          if [[ -s "${status_file}" ]]; then
            cat "${status_file}" >&2
            exit 1
          fi
