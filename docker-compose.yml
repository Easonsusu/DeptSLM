name: deptslm

# Local-development stack. Use scripts/compose.sh so the host path is verified
# as absolute, existing, and outside this repository before Compose runs.
x-deptslm-wrapper-required: "${DEPTSLM_COMPOSE_WRAPPER:?Run ./scripts/compose.sh instead of invoking docker compose directly}"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_URL: "http://api:8000"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      PORT: "3000"
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: "${API_PORT:-8000}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://deptslm:deptslm@postgres:5432/deptslm}"
      DEPTSLM_AUTH_MODE: "${DEPTSLM_AUTH_MODE:-disabled}"
      DEPTSLM_AUTH_ISSUER: "${DEPTSLM_AUTH_ISSUER:-}"
      DEPTSLM_AUTH_AUDIENCE: "${DEPTSLM_AUTH_AUDIENCE:-}"
      DEPTSLM_AUTH_SECRET: "${DEPTSLM_AUTH_SECRET:-}"
      DEPTSLM_DATA_DIR: /runtime/deptslm
      DEPTSLM_DOCUMENT_MAX_BYTES: "${DEPTSLM_DOCUMENT_MAX_BYTES:-26214400}"
      DEPTSLM_DEPARTMENT_DOCUMENT_QUOTA_BYTES: "${DEPTSLM_DEPARTMENT_DOCUMENT_QUOTA_BYTES:-1073741824}"
      DEPTSLM_QDRANT_URL: "${DEPTSLM_QDRANT_URL:-http://qdrant:6333}"
      DEPTSLM_QDRANT_API_KEY: "${DEPTSLM_QDRANT_API_KEY:?Set a non-placeholder Qdrant API key in the untracked .env file}"
      DEPTSLM_QDRANT_COLLECTION: "${DEPTSLM_QDRANT_COLLECTION:-deptslm_chunks_qwen3_0_6b_1024_v1}"
      DEPTSLM_QDRANT_TIMEOUT_SECONDS: "${DEPTSLM_QDRANT_TIMEOUT_SECONDS:-30}"
      DEPTSLM_RAG_RUNTIME_URL: "${DEPTSLM_RAG_RUNTIME_URL:-http://rag-runtime:8010}"
      DEPTSLM_RAG_RUNTIME_TOKEN: "${DEPTSLM_RAG_RUNTIME_TOKEN:?Set a separate RAG runtime token in the untracked .env file}"
      DEPTSLM_RAG_CANDIDATE_LIMIT: "${DEPTSLM_RAG_CANDIDATE_LIMIT:-20}"
      DEPTSLM_RAG_MAX_SOURCES: "${DEPTSLM_RAG_MAX_SOURCES:-8}"
      DEPTSLM_RAG_MAX_SOURCES_PER_DOCUMENT: "${DEPTSLM_RAG_MAX_SOURCES_PER_DOCUMENT:-2}"
      DEPTSLM_RAG_MAX_EVIDENCE_CHARS: "${DEPTSLM_RAG_MAX_EVIDENCE_CHARS:-6000}"
      DEPTSLM_RAG_MIN_SCORE: "${DEPTSLM_RAG_MIN_SCORE:-0.45}"
      DEPTSLM_RAG_REQUEST_TIMEOUT_SECONDS: "${DEPTSLM_RAG_REQUEST_TIMEOUT_SECONDS:-30}"
      DEPTSLM_RAG_FEEDBACK_RETENTION_DAYS: "${DEPTSLM_RAG_FEEDBACK_RETENTION_DAYS:-180}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/uploads"
        target: /runtime/deptslm/uploads
        bind:
          create_host_path: false
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/extracted_text"
        target: /runtime/deptslm/extracted_text
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      rag-runtime:
        condition: service_started
    networks:
      - default
      - rag-internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deptslm
      POSTGRES_PASSWORD: deptslm
      POSTGRES_USER: deptslm
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/service_state/postgres"
        target: /var/lib/postgresql/data
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deptslm -d deptslm"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    environment:
      QDRANT__SERVICE__API_KEY: "${DEPTSLM_QDRANT_API_KEY:?Set a non-placeholder Qdrant API key in the untracked .env file}"
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/service_state/qdrant"
        target: /qdrant/storage
        bind:
          create_host_path: false

  rag-worker:
    build:
      context: .
      dockerfile: services/rag-worker/Dockerfile
      target: extraction
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://deptslm:deptslm@postgres:5432/deptslm}"
      DEPTSLM_DATA_DIR: /runtime/deptslm
      DEPTSLM_EXTRACTION_TIMEOUT_SECONDS: "${DEPTSLM_EXTRACTION_TIMEOUT_SECONDS:-120}"
      DEPTSLM_MAX_EXTRACTED_BYTES: "${DEPTSLM_MAX_EXTRACTED_BYTES:-104857600}"
      DEPTSLM_MAX_PDF_PAGES: "${DEPTSLM_MAX_PDF_PAGES:-1000}"
      DEPTSLM_CHUNK_MAX_CHARS: "${DEPTSLM_CHUNK_MAX_CHARS:-1200}"
      DEPTSLM_CHUNK_OVERLAP_CHARS: "${DEPTSLM_CHUNK_OVERLAP_CHARS:-200}"
      DEPTSLM_MAX_CHUNKS_PER_DOCUMENT: "${DEPTSLM_MAX_CHUNKS_PER_DOCUMENT:-100000}"
      DEPTSLM_EXTRACTION_LEASE_SECONDS: "${DEPTSLM_EXTRACTION_LEASE_SECONDS:-300}"
      DEPTSLM_WORKER_POLL_SECONDS: "${DEPTSLM_WORKER_POLL_SECONDS:-5}"
      DEPTSLM_DEPARTMENT_EXTRACTED_QUOTA_BYTES: "${DEPTSLM_DEPARTMENT_EXTRACTED_QUOTA_BYTES:-4294967296}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/uploads"
        target: /runtime/deptslm/uploads
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/extracted_text"
        target: /runtime/deptslm/extracted_text
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy

  indexing-worker:
    build:
      context: .
      dockerfile: services/rag-worker/Dockerfile
      target: indexing
    command: ["python", "-m", "deptslm_worker.indexer", "--poll"]
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://deptslm:deptslm@postgres:5432/deptslm}"
      DEPTSLM_DATA_DIR: /runtime/deptslm
      DEPTSLM_QDRANT_URL: "${DEPTSLM_QDRANT_URL:-http://qdrant:6333}"
      DEPTSLM_QDRANT_API_KEY: "${DEPTSLM_QDRANT_API_KEY:?Set a non-placeholder Qdrant API key in the untracked .env file}"
      DEPTSLM_QDRANT_COLLECTION: "${DEPTSLM_QDRANT_COLLECTION:-deptslm_chunks_qwen3_0_6b_1024_v1}"
      DEPTSLM_QDRANT_TIMEOUT_SECONDS: "${DEPTSLM_QDRANT_TIMEOUT_SECONDS:-30}"
      DEPTSLM_VECTOR_INDEX_LEASE_SECONDS: "${DEPTSLM_VECTOR_INDEX_LEASE_SECONDS:-300}"
      DEPTSLM_VECTOR_INDEX_POLL_SECONDS: "${DEPTSLM_VECTOR_INDEX_POLL_SECONDS:-5}"
      DEPTSLM_EMBEDDING_BATCH_SIZE: "${DEPTSLM_EMBEDDING_BATCH_SIZE:-8}"
      DEPTSLM_EMBEDDING_MAX_BATCH_CHARS: "${DEPTSLM_EMBEDDING_MAX_BATCH_CHARS:-8192}"
      DEPTSLM_EMBEDDING_TIMEOUT_SECONDS: "${DEPTSLM_EMBEDDING_TIMEOUT_SECONDS:-120}"
      DEPTSLM_EMBEDDING_MODEL_REVISION: "${DEPTSLM_EMBEDDING_MODEL_REVISION:-d23109d65ca9fdf61eef614209744716f337f50f}"
      DEPTSLM_EMBEDDING_PROVIDER: "${DEPTSLM_EMBEDDING_PROVIDER:-real}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/extracted_text"
        target: /runtime/deptslm/extracted_text
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/model_cache"
        target: /runtime/deptslm/model_cache
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  model-admin:
    profiles: ["admin"]
    build:
      context: .
      dockerfile: services/rag-worker/Dockerfile
      target: indexing
    command: ["python", "-c", "print('Invoke the explicit model administration command.')"]
    environment:
      DEPTSLM_DATA_DIR: /runtime/deptslm
      DEPTSLM_STORAGE_READ_ONLY: "0"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      HF_TOKEN: "${HF_TOKEN:-}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/model_cache"
        target: /runtime/deptslm/model_cache
        bind:
          create_host_path: false

  vector-admin:
    profiles: ["admin"]
    build:
      context: .
      dockerfile: services/rag-worker/Dockerfile
      target: indexing
    entrypoint: ["python", "-m", "deptslm_worker.vector_admin"]
    command: ["bootstrap"]
    environment:
      DEPTSLM_QDRANT_URL: "${DEPTSLM_QDRANT_URL:-http://qdrant:6333}"
      DEPTSLM_QDRANT_API_KEY: "${DEPTSLM_QDRANT_API_KEY:?Set a non-placeholder Qdrant API key in the untracked .env file}"
      DEPTSLM_QDRANT_COLLECTION: "${DEPTSLM_QDRANT_COLLECTION:-deptslm_chunks_qwen3_0_6b_1024_v1}"
      DEPTSLM_QDRANT_TIMEOUT_SECONDS: "${DEPTSLM_QDRANT_TIMEOUT_SECONDS:-30}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      qdrant:
        condition: service_started

  rag-runtime:
    build:
      context: .
      dockerfile: services/rag-runtime/Dockerfile
    environment:
      DEPTSLM_DATA_DIR: /runtime/deptslm
      DEPTSLM_RAG_RUNTIME_TOKEN: "${DEPTSLM_RAG_RUNTIME_TOKEN:?Set a separate RAG runtime token in the untracked .env file}"
      DEPTSLM_RAG_RUNTIME_PROVIDER: "${DEPTSLM_RAG_RUNTIME_PROVIDER:-real}"
      DEPTSLM_RAG_RUNTIME_MAX_CONCURRENCY: "${DEPTSLM_RAG_RUNTIME_MAX_CONCURRENCY:-1}"
      DEPTSLM_EMBEDDING_MODEL_REVISION: "${DEPTSLM_EMBEDDING_MODEL_REVISION:-d23109d65ca9fdf61eef614209744716f337f50f}"
      DEPTSLM_GENERATION_MODEL_REVISION: "${DEPTSLM_GENERATION_MODEL_REVISION:-c1899de289a04d12100db370d81485cdf75e47ca}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}/model_cache"
        target: /runtime/deptslm/model_cache
        read_only: true
        bind:
          create_host_path: false
    networks:
      - rag-internal

  training-worker:
    build:
      context: ./services/training-worker
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://deptslm:deptslm@postgres:5432/deptslm}"
      DEPTSLM_DATA_DIR: /runtime/deptslm
      ENVIRONMENT: "${ENVIRONMENT:-development}"
    volumes:
      - type: bind
        source: "${DEPTSLM_DATA_DIR:?DEPTSLM_DATA_DIR is required; run scripts/setup_google_drive_storage.sh}"
        target: /runtime/deptslm
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy

networks:
  rag-internal:
    internal: true
